  <link rel="stylesheet" href="styles.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="container navbar-content">
      <a href="index.html" class="brand">
        <i class="fas fa-heartbeat"></i>
        <span><img src="resources\logo.png" width="250px" style="border-radius: 50px;"></span>
      </a>

      <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
        <i class="fas fa-bars"></i>
      </button>

      <ul class="nav-menu">
        <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
        <li><a href="find-doctor.html"><i class="fas fa-user-md"></i> Find a Doctor</a></li>
        <li><a href="book-appointment.html"><i class="fas fa-calendar-check"></i> Book Appointment</a></li>
       
      </ul>
    </div>
  </nav>

  <div class="login-container">
    <div class="login-box">
      <div style="text-align: center; margin-bottom: 2rem;">
        <i class="fas fa-heartbeat" style="font-size: 3rem; color: var(--primary-color);"></i>
      </div>

      <h2 class="login-title">Welcome Back</h2>

       <form id="appointmentForm" action="patient-dashboard.php" method="post">
            <div class="form-group">
              <label class="form-label" for="patientName">
                <i class="fas fa-user"></i> Patient Name *
              </label>
              <input
                type="text"
                name="name"
                id="patientName"
                class="form-control"
                placeholder="Enter your full name"
                required
              >
            </div>

            <div class="grid grid-2" style="gap: 1rem;">
              <div class="form-group">
                <label class="form-label" for="age">
                  <i class="fas fa-calendar"></i> Age *
                </label>
                <input
                  type="number"
                  id="age"
                  name="age"
                  class="form-control"
                  placeholder="Your age"
                  min="1"
                  max="120"
                  required
                >
              </div>

              <div class="form-group">
                <label class="form-label" for="gender">
                  <i class="fas fa-venus-mars"></i> Gender *
                </label>
                <select id="gender" class="form-control" name="gender" required>
                  <option value="">Select Gender</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="phone">
                <i class="fas fa-phone"></i> Phone Number *
              </label>
              <input
                type="tel"
                id="phone"
                name="phone"
                class="form-control"
                placeholder="Enter your phone number"
                pattern="[0-9]{10}"
                required
              >
            </div>

            <div class="form-group">
              <label class="form-label" for="email">
                <i class="fas fa-envelope"></i> Email Address *
              </label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-control"
                placeholder="Enter your email"
                required
              >
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          <i class="fas fa-sign-in-alt"></i> SignUp
        </button>

</form>

        <i class="fas fa-phone"></i> +91 1800-123-4567 |
        <i class="fas fa-envelope"></i> contact@sanjeevanihospital.com
      </p>
    </div>
  </footer>

</body>
</html>

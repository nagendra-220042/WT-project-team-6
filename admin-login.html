<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="icon" type="image/png" href="resources\logo1.png">

  <link rel="stylesheet" href="styles.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="container navbar-content">
      <a href="index.html" class="brand">
        <i class="fas fa-heartbeat"></i>
        <span><img src="resources\logo.png" width="250px" style="border-radius: 50px;"></span>
      </a>

      <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
        <i class="fas fa-bars"></i>
      </button>

      <ul class="nav-menu">
        <li><a href="index.html"><i class="fas fa-home"></i> Home </a></li>
        <li><a href="find-doctor.html"><i class="fas fa-user-md"></i> Find a Doctor </a></li>
        <li><a href="book-appointment.html"><i class="fas fa-calendar-check"></i> Book Appointment for self/ others </a></li>
        <li><a href="login.html"><i class="fas fa-sign-in-alt"></i> Login </a></li>
      </ul>
    </div>
  </nav>

  <div class="login-container">
    <div class="login-box">
      <div style="text-align: center; margin-bottom: 2rem;">
        <i class="fas fa-heartbeat" style="font-size: 3rem; color: var(--primary-color);"></i>
      </div>

      <h2 class="login-title">Welcome Back</h2>

      <div id="alertMessage" class="alert"></div>

      <div class="role-selector">
        <div class="role-option active" data-role="Admin">
          <i class="fas fa-user-shield"></i>
          <p style="margin-top: 0.5rem; font-weight: 600;">Admin</p>
        </div>
      </div>

      <form id="loginForm" action="admin-dashboard.html">
        <div class="form-group">
          <label class="form-label" for="admin-id">
            <i class="fas fa-user"></i> 
            Admin ID
          </label>
          <input
            type="text"
            id="admin-id"
            class="form-control"
            placeholder="Enter your admin id"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">
            <i class="fas fa-asterik"></i> 
           Password
          </label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Enter your password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>

      

      <div style="text-align: center; margin-top: 1.5rem; color: var(--text-light);">
        <p style="margin-top: 0.5rem; font-size: 0.9rem;">
          login with your user credentials
        </p>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Sanjeevani Hospital. All rights reserved.</p>
      <p style="margin-top: 0.5rem;">
        <i class="fas fa-phone"></i> +91 1900-123-4567 |
        <i class="fas fa-envelope"></i> contact@sanjeevanihospital.com
      </p>
    </div>
  </footer>

  <!-- <script src="script.js"></script> -->
</body>
</html>

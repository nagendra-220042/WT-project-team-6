<body>

      </ul>

   <div class="login-container">
    <div class="login-box">
      

      <h2 class="login-title">SignUp with Google</h2>
      <button onclick="googleLogin()" class="btn btn-secondary ">Signup with Google</button>
       <form id="appointmentForm" action="patient-dashboard.php" method="post">

            Name:<br>
          <input type="text" id="name" name="name" class="form-control" readonly><br><br>

          Email:<br>
          <input type="email" id="email" name="email" class="form-control" readonly><br><br>

            <div class="grid grid-2" style="gap: 1rem;">
              <div class="form-group">
                <label class="form-label" for="age">
                  <i class="fas fa-calendar"></i> Age *
                </label>
                <input
                  type="number"
                  id="age"
                  name="age"
                  class="form-control"
                  placeholder="Your age"
                  min="1"
                  max="120"
                  required
                >
              </div>

              <div class="form-group">
                <label class="form-label" for="gender">
                  <i class="fas fa-venus-mars"></i> Gender *
                </label>
                <select id="gender" class="form-control" name="gender" required>
                  <option value="">Select Gender</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="phone">
                <i class="fas fa-phone"></i> Phone Number *
              </label>
              <input
                type="tel"
                id="phone"
                name="phone"
                class="form-control"
                placeholder="Enter your phone number"
                pattern="[0-9]{10}"
                required
              >
            </div>

            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          <i class="fas fa-sign-in-alt"></i> SignUp
        </button>
       
      

</form>

<script>

// Firebase configuration
var firebaseConfig = {
    apiKey: "AIzaSyACnL25YssweGPswuseVYoQO_gRFpfJr8k",
  authDomain: "hospital-auth-3080b.firebaseapp.com",
  projectId: "hospital-auth-3080b",
  storageBucket: "hospital-auth-3080b.firebasestorage.app",
  messagingSenderId: "998121964570",
  appId: "1:998121964570:web:572aca645b759b96b23da3"

};

firebase.initializeApp(firebaseConfig);


// Google Login
function googleLogin(){

var provider = new firebase.auth.GoogleAuthProvider();

firebase.auth().signInWithPopup(provider)

.then(function(result){

var user = result.user;

var name = user.displayName;
var email = user.email;

// fill input fields
document.getElementById("name").value = name;
document.getElementById("email").value = email;

// show form
document.getElementById("patientForm").style.display = "block";

})

.catch(function(error){
console.log(error);
});

}

</script>
